<svg xmlns="http://www.w3.org/2000/svg" width="80" height="30">
  <style>
    .fade {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 12px;
  font-weight: 600;
  fill: #00498D;
  opacity: 0;
  animation: fadeInOut 3s infinite;
    }

    @keyframes fadeInOut {
      0%   { opacity: 0; }
      50%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
  <text x="50%" y="50%" dominant-baseline="right" text-anchor="middle" class="fade">
    REACT NATIVE DEVELOPER
  </text>
</svg>
