<svg xmlns="http://www.w3.org/2000/svg" width="600" height="100">
  <style>
    .fade {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 32px;
      font-weight: 600;
      fill: #2f80ed; /* Change this hex code for different colors */
      opacity: 0;
      /* The animation: 4 seconds total, ease-in-out curve, loops forever */
      animation: fadeInOut 4s ease-in-out infinite;
    }

    @keyframes fadeInOut {
      0%   { opacity: 0; }
      50%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>

  <!-- x and y are set to 50% to center the text perfectly -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="fade">
    REACT NATIVE DEVELOPER
  </text>
</svg>
