<svg xmlns="http://www.w3.org/2000/svg" width="240" height="50">
  <style>
    .fade {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
      fill: #00498D;
      opacity: 0;
    }

    @keyframes fadeInOut {
      0%   { opacity: 0; }
      50%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>

  <!-- x and y are set to 50% to center the text perfectly -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="fade">
    REACT NATIVE DEVELOPER
  </text>
</svg>
